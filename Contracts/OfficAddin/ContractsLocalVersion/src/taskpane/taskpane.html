<!-- taskpane.html -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>מערכת חוזים</title>

  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"/>
  <link href="taskpane.css" rel="stylesheet" />
</head>

<body class="ms-font-m ms-Fabric">
  <header class="ms-welcome__header ms-bgColor-neutralLighter">
    <img width="200" height="36" src="../../assets/africa-logo.jpg" alt="Africa Contracts" />
    <h1 class="ms-font-su">מערכת חוזים</h1>
  </header>

  <section id="sideload-msg" class="ms-welcome__main">
    <h2 class="ms-font-xl">
      Please
      <a target="_blank" href="https://learn.microsoft.com/office/dev/add-ins/testing/test-debug-office-add-ins#sideload-an-office-add-in-for-testing">sideload</a>
      your add-in to see app body.
    </h2>
  </section>

  <main id="app-body" class="ms-welcome__main" style="display:none;">
    <h2 class="ms-font-xl">פאנל עדכון</h2>

    <ul class="ms-List ms-welcome__features" style="list-style:none; padding:0; margin:0 0 12px;">
      <li class="ms-ListItem" style="margin-bottom:10px;">
        <label for="recipientInput" class="ms-font-m">נמען</label>
        <input id="recipientInput" type="text" placeholder="הקלד/י נמען…" style="width:100%; margin-top:6px;" />
      </li>

      <li class="ms-ListItem" style="margin-bottom:10px;">
        <label for="statusSelect" class="ms-font-m">בחר/י סטטוס מהרשימה</label>
        <select id="statusSelect" style="width:100%; margin-top:6px;">
          <option value="">— טוען סטטוס… —</option>
        </select>
      </li>

      <li class="ms-ListItem" style="margin-bottom:10px;">
        <label for="addressInput" class="ms-font-m">כתובת</label>
        <input id="addressInput" type="text" placeholder="הקלד/י כתובת…" style="width:100%; margin-top:6px;" />
      </li>

      <li class="ms-ListItem">
        <label for="projectSelect" class="ms-font-m">בחר/י פרויקט</label>
        <select id="projectSelect" style="width:100%; margin-top:6px;">
          <option value="">— טוען פרויקטים… —</option>
        </select>
      </li>
    </ul>

    <p class="ms-font-l" style="margin:12px 0;">בחרי פעולה:</p>

    <div role="button" id="runUpdateDoc" class="ms-welcome__action ms-Button ms-Button--hero ms-font-l" style="margin-bottom:10px;" tabindex="0" aria-label="עדכון מסמך">
      <span class="ms-Button-label">עדכון מסמך</span>
    </div>

    <div role="button" id="runSaveSystem" class="ms-welcome__action ms-Button ms-Button--hero ms-font-l" tabindex="0" aria-label="שמור שינויים במערכת">
      <span class="ms-Button-label">שמור שינויים במערכת</span>
    </div>

    <p style="margin-top:10px;">
      <label id="item-subject" class="ms-font-m" aria-live="polite"></label>
    </p>
  </main>
</body>
</html>
